name: Trigger ml-rust Sync

on:
  push:
    branches:
      - master
      - main
    paths:
      - '.gemini/agents/**'
      - '.gemini/skills/**'
      - 'RESEARCH_GUIDE.md'
      - 'KNOWLEDGE_BASE.md'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          repository: mvillal/ml-rust
          event-type: sync-skills
